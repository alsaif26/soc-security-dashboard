<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: #0d1117;
            border: 1px solid #00ff88;
            border-radius: 12px;
            padding: 40px;
            width: 380px;
            text-align: center;
        }

        .login-box h1 {
            color: #00ff88;
            font-size: 22px;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .login-box p {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background-color: #111827;
            border: 1px solid #1e2a3a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #00ff88;
            color: #0a0e1a;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #00cc66;
        }

        .error {
            color: #ff4444;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🛡️ SOC DASHBOARD</h1>
        <p>Security Operations Center</p>

        {% if error %}
        <div class="error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">LOGIN</button>
        </form>
    </div>
</body>
</html>
