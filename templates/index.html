<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0a0e1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            color: #00ff88;
            font-size: 28px;
            letter-spacing: 3px;
        }

        p {
            color: #aaa;
            font-size: 14px;
        }

        .btn {
            padding: 12px 30px;
            background-color: #00ff88;
            color: #0a0e1a;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #00cc66;
        }
    </style>
</head>
<body>
    <h1>🛡️ SOC SECURITY DASHBOARD</h1>
    <p>Security Operations Center — Real Time Monitoring</p>
    <a href="/dashboard" class="btn">Enter Dashboard</a>
</body>
</html>
